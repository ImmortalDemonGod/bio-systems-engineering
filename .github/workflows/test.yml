name: Full Test Suite

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/ || true
        # TODO: remove `|| true` once existing 1,894 ruff errors are fixed

      - name: Type check (mypy)
        run: mypy src/biosystems/ --ignore-missing-imports --no-error-summary || true
        # TODO: remove `|| true` once existing mypy errors are fixed

      - name: Run full test suite
        run: pytest --tb=short -q
        env:
          # Prevent any test from accidentally hitting real Strava/weather APIs
          STRAVA_CLIENT_ID: ci-placeholder
          STRAVA_CLIENT_SECRET: ci-placeholder
          STRAVA_REFRESH_TOKEN: ci-placeholder

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 7
